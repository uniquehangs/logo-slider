<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Partner Logo Slider</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:110px;
    overflow:hidden;
    background:#f3f3f3;
    font-family:Arial,sans-serif;
}

.slider{
    width:100%;
    height:110px;
    display:flex;
    align-items:center;
    overflow:hidden;
}

.slide-track{
    display:flex;
    width:max-content;
    animation:scroll 25s linear infinite;
}

.slider:hover .slide-track{
    animation-play-state:paused;
}

.logo{
    width:180px;
    height:90px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0 20px;
    flex-shrink:0;
}

.logo img{
    max-width:150px;
    max-height:70px;
    object-fit:contain;
    filter:grayscale(100%);
    transition:0.3s ease;
}

.logo img:hover{
    filter:none;
    transform:scale(1.08);
}

@keyframes scroll{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}

/* ---------- Mobile ---------- */

@media (max-width:768px){

html,body{
    height:80px;
}

.slider{
    height:80px;
}

.logo{
    width:120px;
    height:70px;
    margin:0 10px;
}

.logo img{
    max-width:95px;
    max-height:45px;
}

.slide-track{
    animation-duration:18s;
}

}

/* ---------- Small Mobile ---------- */

@media (max-width:480px){

html,body{
    height:70px;
}

.slider{
    height:70px;
}

.logo{
    width:100px;
    margin:0 8px;
}

.logo img{
    max-width:80px;
    max-height:38px;
}

.slide-track{
    animation-duration:15s;
}

}

</style>

</head>

<body>

<div class="slider">

<div class="slide-track">

<div class="logo"><img src="images/babamoni.png"></div>
<div class="logo"><img src="images/cn pixel logo.png"></div>
<div class="logo"><img src="images/CREATIVE ART WEBP.webp"></div>
<div class="logo"><img src="images/dream hom.png"></div>
<div class="logo"><img src="images/mahanam logo.png"></div>
<div class="logo"><img src="images/medisure.png"></div>
<div class="logo"><img src="images/molecular logo.png"></div>

<div class="logo"><img src="images/babamoni.png"></div>
<div class="logo"><img src="images/cn pixel logo.png"></div>
<div class="logo"><img src="images/CREATIVE ART WEBP.webp"></div>
<div class="logo"><img src="images/dream hom.png"></div>
<div class="logo"><img src="images/mahanam logo.png"></div>
<div class="logo"><img src="images/medisure.png"></div>
<div class="logo"><img src="images/molecular logo.png"></div>

</div>

</div>

</body>
</html>
