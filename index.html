<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Logo Slider</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    font-family:Arial,sans-serif;
}

.section{
    width:100%;
    padding:30px 0;
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.slider{
    overflow:hidden;
    white-space:nowrap;
    position:relative;
}

.slide-track{
    display:flex;
    width:max-content;
    animation:scroll 20s linear infinite;
}

.slider:hover .slide-track{
    animation-play-state:paused;
}

.logo{
    width:180px;
    height:90px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0 20px;
}

.logo img{
    max-width:160px;
    max-height:70px;
    object-fit:contain;
    transition:.3s;
    filter:grayscale(100%);
}

.logo img:hover{
    filter:grayscale(0%);
    transform:scale(1.08);
}

@keyframes scroll{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}
</style>
</head>

<body>

<div class="section">

<h2>Our Trusted Partners</h2>

<div class="slider">

<div class="slide-track">

<div class="logo"><img src="images/babamoni.png"></div>
<div class="logo"><img src="images/cn-pixel.png"></div>
<div class="logo"><img src="images/creative-art.webp"></div>
<div class="logo"><img src="images/dream-home.png"></div>
<div class="logo"><img src="images/mahanam.png"></div>
<div class="logo"><img src="images/medisure.png"></div>
<div class="logo"><img src="images/molecular.png"></div>

<!-- Duplicate -->

<div class="logo"><img src="images/babamoni.png"></div>
<div class="logo"><img src="images/cn-pixel.png"></div>
<div class="logo"><img src="images/creative-art.webp"></div>
<div class="logo"><img src="images/dream-home.png"></div>
<div class="logo"><img src="images/mahanam.png"></div>
<div class="logo"><img src="images/medisure.png"></div>
<div class="logo"><img src="images/molecular.png"></div>

</div>

</div>

</div>

</body>
</html>
